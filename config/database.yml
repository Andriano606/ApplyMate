default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
  gssencmode: disable
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    database: apply_mate_development
    max_connections: 15
  queue:
    <<: *default
    database: apply_mate_development
    migrations_paths: db/queue_migrate
    max_connections: 8
  cable:
    <<: *default
    database: apply_mate_development
    migrations_paths: db/cable_migrate
    max_connections: 5

test:
  <<: *default
  database: apply_mate_test

production:
  primary: &primary_production
    <<: *default
    database: apply_mate_production
    username: apply_mate
    password: <%= ENV["APPLY_MATE_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: apply_mate_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: apply_mate_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: apply_mate_production_cable
    migrations_paths: db/cable_migrate
