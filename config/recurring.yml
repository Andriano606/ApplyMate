fetch_proxies:
  class: Proxy::Job::FetchProxies
  schedule: every day at 0am
# Disabled: Proxy::Operation::Validate now probes Cloudflare sources (Dou) through
# ImpersonateHttp, which spawns a curl-impersonate subprocess per probe — far too
# CPU-heavy to run unthrottled every 5 minutes (piled up and hung the queue).
# Re-enable only with a small `limit:` arg and a lower IMPERSONATE_CONCURRENCY.
# validate_proxies:
#   class: Proxy::Job::Validate
#   schedule: every 5 minutes
#sync_vacancies:
#  class: Vacancy::Job::SyncVacancies
#  schedule: every day at 3am
clear_solid_queue_finished_jobs:
  command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
  schedule: every hour at minute 12
