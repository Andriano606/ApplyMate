# Staging environment configuration.
# Usage: bin/kamal deploy -d staging

# Different service name prevents container conflicts with production on the same host.
service: apply_mate_staging

image: andriano606/apply_mate

# Multi-arch build: dev machine (amd64) builds locally, RPi (arm64) builds remotely.
# Requires DOCKER_HOST=unix:///home/andrii/.docker/desktop/docker.sock in the shell
# (Docker Desktop uses a non-standard socket path on Linux).
builder:
  arch:
    - amd64
    - arm64
  remote: ssh://andrii@192.168.50.155

proxy:
  app_port: 80
  hosts:
    - staging.applymate.local
    - staging.beapply.xyz

# SSH user for all servers. Override per-server with "user@host" in hosts list.
ssh:
  user: andrii

servers:
  web:
    hosts:
      - 192.168.50.155
    options:
      ulimit:
        - "nofile=65536:65536"

  worker:
    hosts:
      - 192.168.50.155
    cmd: bin/jobs
    options:
      ulimit:
        - "nofile=65536:65536"
    env:
      clear:
        SQ_QUEUES: "*"
        SQ_POLLING_INTERVAL: "1"
        SQ_PROCESSES: "4"
        SQ_THREADS: "2"
        FETCH_PROXIES_SHARD_COUNT: "4"


registry:
  username: andriano606
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - APPLY_MATE_DATABASE_PASSWORD
    - MINIO_ACCESS_KEY_ID
    - MINIO_SECRET_ACCESS_KEY
  clear:
    RAILS_ENV: staging
    # Workers run as separate containers — not embedded in Puma.
    SOLID_QUEUE_IN_PUMA: false
    # Accessory container name = {service}-db (used by web + worker on RPi via Docker network).
    DB_HOST: apply_mate_staging-db
    DB_PORT: "5432"
    RAILS_LOG_LEVEL: info
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 2
    APP_HOST: staging.beapply.xyz
    # MinIO endpoint used by all containers via this IP.
    MINIO_ENDPOINT: http://192.168.50.155:9002
    MINIO_BUCKET: apply-mate-staging
    ELASTICSEARCH_URL: http://apply_mate_staging-elasticsearch:9200
    # Grafana is published on host port 3001 (see grafana accessory below).
    # Adjust if Grafana is reverse-proxied behind a domain.
    GRAFANA_URL: http://192.168.50.155:3001

accessories:
  db:
    image: postgres:17
    host: 192.168.50.155
    # External port 5434 avoids conflict with print_mate_staging-db on 5433.
    port: "5434:5432"
    env:
      clear:
        POSTGRES_USER: apply_mate
        POSTGRES_DB: apply_mate_staging
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    host: 192.168.50.155
    # 9002 = S3 API, 9003 = web console (http://192.168.50.155:9003)
    # Offset by 2 from default to avoid conflict with print_mate_staging-minio on 9000/9001.
    options:
      publish:
        - "9002:9000"
        - "9003:9001"
    cmd: server /data --console-address ":9001"
    env:
      secret:
        - MINIO_ROOT_USER
        - MINIO_ROOT_PASSWORD
    directories:
      - data:/data

  elasticsearch:
    image: elasticsearch:8.13.0
    host: 192.168.50.155
    # External port 9201 avoids conflict if another app uses 9200.
    # App containers reach ES via Docker network on the internal port 9200.
    port: "9201:9200"
    env:
      clear:
        discovery.type: single-node
        xpack.security.enabled: "false"
        # Kept low for RPi — raise to 512m/512m if you have headroom.
        ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    directories:
      - data:/usr/share/elasticsearch/data

  chrome_vnc:
    image: andriano606/apply_mate_chrome_vnc:latest
    host: 192.168.50.155
    options:
      shm-size: "2gb"
      security-opt: seccomp:unconfined
      # network-alias gives the container a valid RFC hostname (no underscores)
      # so Ruby's URI.join can parse it. Default CHROME_HOST='chrome-vnc' works as-is.
      network-alias: chrome-vnc
      publish:
        - "6081:6080"   # noVNC web UI
        - "5901:5900"   # VNC (RealVNC / TigerVNC)
        - "9222:9222"   # Chrome DevTools Protocol
    env:
      clear:
        SCREEN_WIDTH: "1920"
        SCREEN_HEIGHT: "1080"
        SCREEN_DEPTH: "24"
        VNC_PASSWORD: ""

  # ---- Observability stack: Loki + Promtail + Grafana ----
  # Other Kamal-managed containers reach Loki via the internal Docker network
  # at the accessory's hostname: apply_mate_staging-loki:3100.
  loki:
    image: grafana/loki:3.0.0
    host: 192.168.50.155
    cmd: -config.file=/etc/loki/loki-config.yml
    files:
      - docker/loki/loki-config.yml:/etc/loki/loki-config.yml
    directories:
      - data:/loki
    # Run as root because Kamal's bind-mount host dir is owned by the SSH
    # user (andrii), and Loki's default UID 10001 can't write to it.
    options:
      user: "0"

  # Promtail scrapes Docker container logs (Rails web + worker write to STDOUT;
  # captured by Docker's json-file driver) and forwards them to Loki.
  # Requires read access to /var/run/docker.sock and /var/lib/docker/containers
  # → runs as root.
  promtail:
    image: grafana/promtail:3.0.0
    host: 192.168.50.155
    cmd: -config.file=/etc/promtail/promtail-config.yml
    files:
      - docker/promtail/promtail-config.staging.yml:/etc/promtail/promtail-config.yml
    directories:
      - positions:/tmp/positions
    options:
      user: "root"
      volume:
        - "/var/run/docker.sock:/var/run/docker.sock:ro"
        - "/var/lib/docker/containers:/var/lib/docker/containers:ro"

  # Grafana UI on host port 3001. Anonymous Admin access — keep this server
  # off the public internet, or put it behind auth / reverse proxy.
  grafana:
    image: grafana/grafana:11.0.0
    host: 192.168.50.155
    port: "3001:3000"
    env:
      clear:
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
        GF_AUTH_DISABLE_LOGIN_FORM: "true"
    files:
      - docker/grafana/provisioning/dashboards/applymate.yml:/etc/grafana/provisioning/dashboards/applymate.yml
      - docker/grafana/provisioning/dashboards/sync_vacancies.json:/etc/grafana/provisioning/dashboards/sync_vacancies.json
      - docker/grafana/provisioning/datasources/loki.staging.yml:/etc/grafana/provisioning/datasources/loki.yml
      - docker/grafana/provisioning/alerting/proxy_validation.yml:/etc/grafana/provisioning/alerting/proxy_validation.yml
    directories:
      - data:/var/lib/grafana
    # Run as root because Kamal's bind-mount host dir is owned by the SSH
    # user (andrii), and Grafana's default UID 472 can't write to it.
    options:
      user: "0"
