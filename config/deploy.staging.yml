# Staging environment configuration.
# Usage: bin/kamal deploy -d staging

# Different service name prevents container conflicts with production on the same host.
service: apply_mate_staging

image: andriano606/apply_mate

# Multi-arch build: dev machine (amd64) builds locally, RPi (arm64) builds remotely.
# Requires DOCKER_HOST=unix:///home/andrii/.docker/desktop/docker.sock in the shell
# (Docker Desktop uses a non-standard socket path on Linux).
builder:
  arch:
    - amd64
    - arm64
  remote: ssh://andrii@192.168.31.58

proxy:
  app_port: 80
  hosts:
    - staging.applymate.local
    - staging.beapply.xyz

# SSH user for all servers. Override per-server with "user@host" in hosts list.
ssh:
  user: andrii

servers:
  web:
    hosts:
      - 192.168.31.58

  worker:
    hosts:
      - 192.168.31.58
    cmd: bin/jobs
    env:
      clear:
        SQ_QUEUES: "*"
        SQ_POLLING_INTERVAL: "1"
        SQ_PROCESSES: "2"
        SQ_THREADS: "2"


registry:
  username: andriano606
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - APPLY_MATE_DATABASE_PASSWORD
    - MINIO_ACCESS_KEY_ID
    - MINIO_SECRET_ACCESS_KEY
  clear:
    RAILS_ENV: staging
    # Workers run as separate containers — not embedded in Puma.
    SOLID_QUEUE_IN_PUMA: false
    # Accessory container name = {service}-db (used by web + worker on RPi via Docker network).
    DB_HOST: apply_mate_staging-db
    DB_PORT: "5432"
    RAILS_LOG_LEVEL: info
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 2
    APP_HOST: staging.beapply.xyz
    # MinIO endpoint used by all containers via this IP.
    MINIO_ENDPOINT: http://192.168.31.58:9002
    MINIO_BUCKET: apply-mate-staging
    ELASTICSEARCH_URL: http://apply_mate_staging-elasticsearch:9200

accessories:
  db:
    image: postgres:17
    host: 192.168.31.58
    # External port 5434 avoids conflict with print_mate_staging-db on 5433.
    port: "5434:5432"
    env:
      clear:
        POSTGRES_USER: apply_mate
        POSTGRES_DB: apply_mate_staging
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    host: 192.168.31.58
    # 9002 = S3 API, 9003 = web console (http://192.168.31.58:9003)
    # Offset by 2 from default to avoid conflict with print_mate_staging-minio on 9000/9001.
    options:
      publish:
        - "9002:9000"
        - "9003:9001"
    cmd: server /data --console-address ":9001"
    env:
      secret:
        - MINIO_ROOT_USER
        - MINIO_ROOT_PASSWORD
    directories:
      - data:/data

  elasticsearch:
    image: elasticsearch:8.13.0
    host: 192.168.31.58
    # External port 9201 avoids conflict if another app uses 9200.
    # App containers reach ES via Docker network on the internal port 9200.
    port: "9201:9200"
    env:
      clear:
        discovery.type: single-node
        xpack.security.enabled: "false"
        # Kept low for RPi — raise to 512m/512m if you have headroom.
        ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    directories:
      - data:/usr/share/elasticsearch/data

  chrome_vnc:
    image: andriano606/apply_mate_chrome_vnc:latest
    host: 192.168.31.58
    options:
      shm-size: "2gb"
      security-opt: seccomp:unconfined
      # network-alias gives the container a valid RFC hostname (no underscores)
      # so Ruby's URI.join can parse it. Default CHROME_HOST='chrome-vnc' works as-is.
      network-alias: chrome-vnc
      publish:
        - "6081:6080"   # noVNC web UI
        - "5901:5900"   # VNC (RealVNC / TigerVNC)
        - "9222:9222"   # Chrome DevTools Protocol
    env:
      clear:
        SCREEN_WIDTH: "1920"
        SCREEN_HEIGHT: "1080"
        SCREEN_DEPTH: "24"
        VNC_PASSWORD: ""
