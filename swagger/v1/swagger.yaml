---
openapi: 3.0.1
info:
  title: ApplyMate API
  version: v1
paths:
  "/admin/proxies":
    get:
      summary: List proxies
      tags:
      - Proxies
      description: Returns the proxies ordered by reliability, paginated.
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        description: Page number (will_paginate)
        schema:
          type: integer
      responses:
        '200':
          description: proxies listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        protocol:
                          type: string
                        host:
                          type: string
                        port:
                          type: integer
                        url:
                          type: string
                        success_count:
                          type: integer
                        fail_count:
                          type: integer
                        failed_at:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                        updated_at:
                          type: string
                  pagination:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_entries:
                        type: integer
                      next_page:
                        type: integer
                        nullable: true
        '403':
          description: token does not belong to an admin
servers:
- url: "/"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
