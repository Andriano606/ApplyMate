apiVersion: 1

groups:
  - name: ProxyValidation
    folder: ApplyMate
    interval: 5m
    orgId: 1
    rules:

      # Fires when ValidateCandidates completes with zero valid proxies.
      # Means all proxy sources are down or exhausted — applies are blocked.
      - uid: applymate-proxy-no-results
        title: No Valid Proxies Found
        condition: C
        for: 0s
        noDataState: OK
        execErrState: OK
        annotations:
          summary: "Proxy validation returned 0 valid proxies"
          description: "Proxy::Operation::ValidateCandidates completed but found no reachable proxies. Check proxy sources or network."
        labels:
          severity: critical
          team: backend
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 3600
              to: 0
            model:
              expr: 'sum(count_over_time({job="rails"} | json | event="proxy_validation_no_results" [1h]))'
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              refId: C
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last

      # Fires when valid proxy rate drops below 3% of total candidates.
      # Warning-level — proxies still exist but quality is degrading.
      - uid: applymate-proxy-low-rate
        title: Proxy Validation Rate Critical
        condition: C
        for: 0s
        noDataState: OK
        execErrState: OK
        annotations:
          summary: "Proxy validation rate below 3%"
          description: "Less than 3% of candidates passed validation. value={{ $values.B }}%."
        labels:
          severity: warning
          team: backend
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 86400
              to: 0
            model:
              expr: 'last_over_time({job="rails"} | json | event="proxy_validation_completed" | unwrap rate [24h])'
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              refId: C
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [3]
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
