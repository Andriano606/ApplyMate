server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://apply_mate_staging-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: kamal_docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        # Filter at the Docker API level so accessories (loki, promtail,
        # grafana, kamal-proxy, buildx, etc.) are never discovered. Docker's
        # label filter is exact-match, so this matches only web/worker (which
        # have service=apply_mate_staging); accessories have service values
        # like apply_mate_staging-loki and are excluded.
        # relabel_configs `action: keep` proved unreliable here — Promtail 3.0.0
        # kept scraping every running container, which caused Promtail to
        # forward Loki's own rejection errors back to Loki in an infinite loop.
        filters:
          - name: label
            values: ['service=apply_mate_staging']

    relabel_configs:
      # Match the dashboards & alerting rules which filter on {job="rails"}
      - target_label: 'job'
        replacement: 'rails'
      - target_label: 'app'
        replacement: 'apply_mate'
      - target_label: 'env'
        replacement: 'staging'

      - source_labels: ['__meta_docker_container_label_role']
        target_label: 'role'
      - source_labels: ['__meta_docker_container_label_destination']
        target_label: 'destination'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

    pipeline_stages:
      # Unwrap Docker json-file driver envelope ({"log":"...","stream":"stdout","time":"..."})
      - docker: {}
      # Strip ActiveJob/ActiveSupport tag prefixes (e.g.
      # `[ActiveJob] [Vacancy::Job::SyncVacancies] [job-id] {...}`) so the
      # downstream `| json` parser (and Loki dashboards) see the bare JSON
      # payload. Lines without a leading `[tag]` pass through unchanged.
      - replace:
          expression: '^(\[[^\]]+\] (?:\[[^\]]+\] )*)'
          replace: ''
      # Parse Rails JSON log line (lograge / vacancy_sync_* events)
      - json:
          expressions:
            method: method
            path: path
            status: status
            controller: controller
            action: action
      - labels:
          method:
          status:
          controller:
