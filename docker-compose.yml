services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  chrome:
    build: docker/chrome_vnc
    image: chrome-vnc:latest
    container_name: apply-mate-chrome-vnc
    shm_size: "2gb"          # Chrome потребує достатньо shared memory
    ports:
      - "6081:6080"          # noVNC web → відкрий http://localhost:6080/vnc.html
      - "5901:5900"          # VNC (для VNC-клієнтів типу RealVNC/TigerVNC)
      - "9222:9222"          # Chrome DevTools Protocol
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - SCREEN_DEPTH=24
      - VNC_PASSWORD=        # Встанови пароль або залиш порожнім
      - EXTERNAL_CHROME_HOST=localhost:9222
    volumes:
      - ./scripts:/app/scripts   # Монтуй свої Python скрипти сюди
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/apply-mate-dev;
        mc anonymous set download local/apply-mate-dev;
      "

volumes:
  postgres_data:
  elasticsearch_data:
  minio_data:
