name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: RuboCop
        run: bin/rubocop -f github

      - name: Prettier
        run: bunx prettier --check "app/**/*.{js,css}"

      - name: i18n-tasks health
        run: bundle exec i18n-tasks health

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

      # redis:
      #   image: valkey/valkey:8
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
#          sudo apt-get install -y --no-install-recommends \
#            libpq-dev \
#            libglib2.0-0 \
#            libgomp1 \
#            libxi6 \
#            libxrender1 \
#            libxxf86vm1 \
#            libegl1 \
#            libgl1-mesa-dri \
#            google-chrome-stable || true
#            # "|| true" prevents failure if Chrome is already installed

#      - name: Install Python Dependencies
#        run: |
#          python3 -m pip install --upgrade pip
#          pip install numpy trimesh psycopg2-binary

#      - name: Install Blender
#        run: |
#          sudo mkdir -p /opt/blender
#          curl -fSL "https://download.blender.org/release/Blender4.3/blender-4.3.2-linux-x64.tar.xz" \
#            | sudo tar -xJ --strip-components=1 -C /opt/blender

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install JS dependencies and build assets
        run: bun install --frozen-lockfile && bun run build:css && bun run build && bin/rails assets:precompile
        env:
          RAILS_ENV: test

      - name: Prepare database
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: bin/rails db:create db:migrate

      - name: Run RSpec
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          BLENDER_BIN: /opt/blender/blender
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          # REDIS_URL: redis://localhost:6379/0
        run: bundle exec rspec

      - name: Run Cucumber
        env:
          CI: true
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          BLENDER_BIN: /opt/blender/blender
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          # REDIS_URL: redis://localhost:6379/0
        run: bundle exec cucumber
